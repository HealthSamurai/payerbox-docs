<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500"
     width="1080" height="500" fill="none" preserveAspectRatio="xMidYMid meet"
     style="max-width:100%;height:auto;">
  <style>
    line, rect, polygon, path, circle, ellipse { vector-effect: non-scaling-stroke; }
    .d-group-title-red    { font: 600 13px/1.2 'Inter', system-ui, sans-serif; letter-spacing: 0.2em; text-transform: uppercase; fill: #EC291C; }
    .d-group-title-blue   { font: 600 13px/1.2 'Inter', system-ui, sans-serif; letter-spacing: 0.2em; text-transform: uppercase; fill: #549FEA; }
    .d-group-title-neutral{ font: 600 13px/1.2 'Inter', system-ui, sans-serif; letter-spacing: 0.2em; text-transform: uppercase; fill: #525263; }
    .d-card-title         { font: 400 13px/1.2 'Inter', system-ui, sans-serif; fill: #353B50; }
    .d-card-sub           { font: 400 11px/1.4 'Inter', system-ui, sans-serif; fill: #525263; }
    .d-conn-op            { font: 400 11px/1.2 'Inter', system-ui, sans-serif; fill: #353B50; }
    .d-stage-tag          { font: 600 11px/1.2 'Inter', system-ui, sans-serif; letter-spacing: 0.15em; text-transform: uppercase; fill: #EC291C; }
  </style>

  <!-- LEFT: Provider EHR group (blue) with 3 sub-cards -->
  <rect x="20" y="60" width="220" height="380" fill="#FFFFFF" stroke="#549FEA" stroke-width="2" rx="14"/>
  <text x="130" y="92" text-anchor="middle" class="d-group-title-blue">Provider EHR</text>

  <rect x="40" y="115" width="180" height="80" fill="#E5F2FF" rx="10"/>
  <text x="130" y="148" text-anchor="middle" class="d-card-title">CDS Hooks client</text>
  <text x="130" y="170" text-anchor="middle" class="d-card-sub">order-sign · order-select</text>
  <text x="130" y="185" text-anchor="middle" class="d-card-sub">order-dispatch · appointment-book</text>

  <rect x="40" y="215" width="180" height="80" fill="#E5F2FF" rx="10"/>
  <text x="130" y="248" text-anchor="middle" class="d-card-title">DTR launcher</text>
  <text x="130" y="270" text-anchor="middle" class="d-card-sub">Opens the DTR SMART app</text>
  <text x="130" y="285" text-anchor="middle" class="d-card-sub">via SMART App Launch</text>

  <rect x="40" y="315" width="180" height="80" fill="#E5F2FF" rx="10"/>
  <text x="130" y="348" text-anchor="middle" class="d-card-title">PAS client</text>
  <text x="130" y="370" text-anchor="middle" class="d-card-sub">Submits Claim Bundle</text>
  <text x="130" y="385" text-anchor="middle" class="d-card-sub">(FHIR or X12 278)</text>

  <!-- CENTER: Payerbox group (red) with 3 sub-cards -->
  <rect x="420" y="60" width="240" height="380" fill="#FFFFFF" stroke="#EA4A35" stroke-width="2" rx="14"/>
  <text x="540" y="92" text-anchor="middle" class="d-group-title-red">Payerbox</text>

  <rect x="440" y="115" width="200" height="80" fill="#FCEEEB" rx="10"/>
  <text x="540" y="148" text-anchor="middle" class="d-card-title">CRD CDS service</text>
  <text x="540" y="170" text-anchor="middle" class="d-card-sub">Receives hooks, forwards</text>
  <text x="540" y="185" text-anchor="middle" class="d-card-sub">to decision service</text>

  <rect x="440" y="215" width="200" height="80" fill="#FCEEEB" rx="10"/>
  <text x="540" y="248" text-anchor="middle" class="d-card-title">DTR SMART app</text>
  <text x="540" y="270" text-anchor="middle" class="d-card-sub">Renders Questionnaire, runs CQL.</text>
  <text x="540" y="285" text-anchor="middle" class="d-card-sub">Loaded via $questionnaire-package</text>

  <rect x="440" y="315" width="200" height="80" fill="#FCEEEB" rx="10"/>
  <text x="540" y="345" text-anchor="middle" class="d-card-title">PAS endpoint</text>
  <text x="540" y="365" text-anchor="middle" class="d-card-sub">Claim/$submit, $inquire,</text>
  <text x="540" y="380" text-anchor="middle" class="d-card-sub">Subscription notifications,</text>
  <text x="540" y="392" text-anchor="middle" class="d-card-sub">X12 ↔ FHIR converter</text>

  <!-- RIGHT: Health Plan (or third-party) backend with 2 sub-cards -->
  <rect x="840" y="60" width="220" height="380" fill="#FFFFFF" stroke="#D3DBE6" stroke-width="2" rx="14"/>
  <text x="950" y="92" text-anchor="middle" class="d-group-title-neutral">Health Plan</text>

  <rect x="860" y="115" width="180" height="80" fill="#F6F7F8" rx="10"/>
  <text x="950" y="148" text-anchor="middle" class="d-card-title">Decision service</text>
  <text x="950" y="170" text-anchor="middle" class="d-card-sub">Coverage rules,</text>
  <text x="950" y="185" text-anchor="middle" class="d-card-sub">policies</text>

  <rect x="860" y="315" width="180" height="80" fill="#F6F7F8" rx="10"/>
  <text x="950" y="348" text-anchor="middle" class="d-card-title">UM system</text>
  <text x="950" y="370" text-anchor="middle" class="d-card-sub">Adjudication,</text>
  <text x="950" y="385" text-anchor="middle" class="d-card-sub">clinical reviewer</text>

  <!-- Stage 1: CRD (between row 1 of each group) -->
  <line x1="220" y1="155" x2="418" y2="155" stroke="#353B50" stroke-width="1"/>
  <polygon points="420,155 412,151 412,159" fill="#353B50"/>
  <rect x="290" y="149" width="60" height="12" fill="#FFFFFF"/>
  <text x="320" y="159" text-anchor="middle" class="d-stage-tag">CRD</text>

  <line x1="660" y1="155" x2="838" y2="155" stroke="#353B50" stroke-width="1"/>
  <polygon points="840,155 832,151 832,159" fill="#353B50"/>

  <!-- Stage 2: DTR (EHR <-> Payerbox only; questionnaire library lives in Payerbox, no external call) -->
  <line x1="220" y1="255" x2="418" y2="255" stroke="#353B50" stroke-width="1"/>
  <polygon points="420,255 412,251 412,259" fill="#353B50"/>
  <rect x="290" y="249" width="60" height="12" fill="#FFFFFF"/>
  <text x="320" y="259" text-anchor="middle" class="d-stage-tag">DTR</text>

  <!-- Stage 3: PAS forward (EHR -> Payerbox) -->
  <line x1="220" y1="345" x2="418" y2="345" stroke="#353B50" stroke-width="1"/>
  <polygon points="420,345 412,341 412,349" fill="#353B50"/>
  <rect x="290" y="339" width="60" height="12" fill="#FFFFFF"/>
  <text x="320" y="349" text-anchor="middle" class="d-stage-tag">PAS</text>

  <!-- Stage 3: PAS return notification (Payerbox -> EHR via FHIR Subscription) -->
  <line x1="420" y1="365" x2="222" y2="365" stroke="#353B50" stroke-width="1"/>
  <polygon points="220,365 228,361 228,369" fill="#353B50"/>
  <rect x="258" y="359" width="124" height="12" fill="#FFFFFF"/>
  <text x="320" y="369" text-anchor="middle" class="d-conn-op">Subscription notification</text>

  <!-- Stage 3: Payerbox -> UM system -->
  <line x1="660" y1="355" x2="838" y2="355" stroke="#353B50" stroke-width="1"/>
  <polygon points="840,355 832,351 832,359" fill="#353B50"/>
</svg>
